name: CI

# Layer-0 deterministic component evals are the required gate (brief §3, ROADMAP).
# At M0 this is a scaffold: lint + an empty/smoke test suite. As subsystems land
# (M1 onward), the Layer-0 suite plugs in here and becomes blocking.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (clean)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Layer-0 deterministic gate
        run: pytest -m layer0   # docs/layer0_gate.md — no merge on red
